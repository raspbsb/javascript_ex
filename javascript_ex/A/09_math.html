<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <title>Math</title>
  </head>

  <body>
    <h1>Math</h1>
    <pre>
      Math.abs(대상) 절대값으로 변경
      Math.ceil(대상) 소수점을 무조건 올림
      Math.floor(대상) 소수점을 무조건 내림
      Math.round(대상) 반올림
      Math.random() 무작위 숫자 생성 0~1
    </pre>
    <script>
      console.log(Math.abs(-100)); // 100, 절댓값
      console.log(Math.ceil(1.1)); // 2, 천장
      console.log(Math.floor(1.8)); // 1, 바닥
      console.log(Math.round(1.5)); // 2
      console.log(Math.round(1.4)); // 1
    </script>
    <hr />
    <h2>Math.random</h2>
    <pre>
      무작위로 난수 생성
    </pre>
    <script>
      // console.log(Math.random()*10);

      var products = ["a", "b", "c", "d", "e", "f", "g"];

      var n1 = Math.floor(Math.random() * 10);
      var n2 = Math.floor(n1);
      var n3 = n2 % products.length;

      console.log(n2); // 0 ~ 9

      document.write(products[n3]);
    </script>
    <h2>난수 생성하기</h2>
    <script></script>
  </body>
</html>
